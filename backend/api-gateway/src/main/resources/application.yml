server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://campus-auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: student-service
          uri: http://campus-student-siva:8082
          predicates:
            - Path=/api/students/**
          filters:
            - AuthenticationFilter

        - id: event-service
          uri: http://campus-event-siva:8083
          predicates:
            - Path=/api/events/**
          filters:
            - AuthenticationFilter

        - id: faculty-service
          uri: http://campus-faculty-siva:8084
          predicates:
            - Path=/api/faculty/**
          filters:
            - AuthenticationFilter

