server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: student-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/students/**
          filters:
            - AuthenticationFilter

        - id: event-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/events/**
          filters:
            - AuthenticationFilter

        - id: faculty-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/faculty/**
          filters:
            - AuthenticationFilter

