version: '3.8'

services:
  auth-db:
    image: mysql:8.0
    container_name: auth-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports:
      - "3306:3306"
    networks:
      - campus-network

  student-db:
    image: mysql:8.0
    container_name: student-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_db
    ports:
      - "3307:3306"
    networks:
      - campus-network

  event-db:
    image: mysql:8.0
    container_name: event-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_db
    ports:
      - "3308:3306"
    networks:
      - campus-network

  faculty-db:
    image: mysql:8.0
    container_name: faculty-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: faculty_db
    ports:
      - "3309:3306"
    networks:
      - campus-network

networks:
  campus-network:
    driver: bridge
